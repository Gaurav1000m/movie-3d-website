<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script>
        window.addEventListener('message', function(event) {
            if (event.data && event.data.html) {
                document.open();
                document.write(event.data.html);
                document.close();
            }
        });
    </script>
</body>
</html>
